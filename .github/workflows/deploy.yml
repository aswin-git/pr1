name: deploy

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Setup python1
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: req
      run: pip install -r requirements.txt

    - name: run
      run: python src/app.py


    
    
